plugins {
    id 'application'
    id 'groovy'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation localGroovy()
    implementation 'com.google.guava:guava:32.1.2-jre' // optional, falls du Guava nutzen willst

    // JUnit 4
    testImplementation 'junit:junit:4.13.2'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17) // 17 reicht, 21 optional
    }
}

application {
    mainClass = 'cicd.App' // passe an deinen Paketnamen an
}

tasks.named('test') {
    useJUnit() // JUnit 4 statt JUnit Platform
}

jar {
    manifest {
        attributes(
            'Main-Class': 'cicd.App'
        )
    }
}